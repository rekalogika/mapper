doctrine:
    dbal:
        driver: pdo_sqlite
        memory: true
        charset: UTF8

    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                type: attribute
                dir: "%kernel.project_dir%/src/Fixtures/Doctrine"
                prefix: 'Rekalogika\Mapper\Tests\Fixtures\Doctrine'
                alias: App
